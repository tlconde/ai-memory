name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify CLI
        run: node dist/cli/index.js --version

      - name: Test init
        run: |
          node dist/cli/index.js init --dir /tmp/test-project
          test -f /tmp/test-project/.ai/IDENTITY.md
          test -f /tmp/test-project/.ai/DIRECTION.md
          test -f /tmp/test-project/.ai/memory/memory-index.md

      - name: Test install
        run: |
          node dist/cli/index.js install --to cursor --dir /tmp/test-project
          test -f /tmp/test-project/.cursor/rules/00-load-ai-memory.mdc
          test -f /tmp/test-project/.agents/skills/mem-compound/SKILL.md
